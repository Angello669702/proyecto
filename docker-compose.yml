services:

  mysql:
    image: mysql:8.0
    container_name: miapp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: proyecto
      MYSQL_USER: angel
      MYSQL_PASSWORD: angel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - miapp_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miapp_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - miapp_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: miapp_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - miapp_network

volumes:
  mysql_data:

networks:
  miapp_network:
    driver: bridge
