<header
  class="fixed top-0 left-0 right-0 h-16 bg-white/80 backdrop-blur-md border-b border-stone-200 flex items-center justify-between px-8 z-50"
>
  <div
    class="w-48 font-serif text-lg font-bold text-rose-950 uppercase tracking-[0.2em] cursor-pointer"
    (click)="navigate(['/', 'home'])"
  >
    Mi Empresa
  </div>

  <nav class="flex gap-2 p-1 bg-stone-100/50 rounded-lg border border-stone-100">
    <a
      routerLinkActive="bg-white text-rose-900 shadow-sm"
      class="px-5 py-2 text-[11px] font-semibold uppercase tracking-widest text-stone-500 hover:text-rose-800 rounded-md transition-all duration-300 cursor-pointer"
      (click)="navigate(['/', 'home'])"
    >
      Inicio
    </a>
    <a
      routerLinkActive="bg-white text-rose-900 shadow-sm"
      class="px-5 py-2 text-[11px] font-semibold uppercase tracking-widest text-stone-500 hover:text-rose-800 rounded-md transition-all duration-300 cursor-pointer"
      (click)="navigate(productsNavigation['catalog'])"
    >
      Catálogo
    </a>
    @if (!isAdmin()) {
      <a
        routerLinkActive="bg-white text-rose-900 shadow-sm"
        class="px-5 py-2 text-[11px] font-semibold uppercase tracking-widest text-stone-500 hover:text-rose-800 rounded-md transition-all duration-300 cursor-pointer"
        (click)="navigate(transactionsNavigation['cart'])"
      >
        Carrito
      </a>
    } @else {
      <a
        routerLinkActive="bg-white text-rose-900 shadow-sm"
        class="px-5 py-2 text-[11px] font-semibold uppercase tracking-widest text-stone-500 hover:text-rose-800 rounded-md transition-all duration-300 cursor-pointer"
        (click)="navigate(registrationsNavigation['all'])"
      >
        Registros
      </a>
      <a
        routerLinkActive="bg-white text-rose-900 shadow-sm"
        class="px-5 py-2 text-[11px] font-semibold uppercase tracking-widest text-stone-500 hover:text-rose-800 rounded-md transition-all duration-300 cursor-pointer"
        (click)="navigate(productsNavigation['new'])"
      >
        Agregar Producto
      </a>
    }
  </nav>

  @if (!isLoggued()) {
    <div class="w-48 flex justify-end">
      <button
        class="px-6 py-2 text-[10px] font-bold uppercase tracking-widest border-2 border-rose-900 text-rose-900 rounded-full hover:bg-rose-900 hover:text-white transition-all duration-300 cursor-pointer shadow-sm active:scale-95"
        (click)="navigate(authNavigation['login'])"
      >
        Login
      </button>
    </div>
  } @else {
    <div class="w-48 flex justify-end items-center gap-4">
      <div
        class="flex items-center gap-3 cursor-pointer group"
        (click)="navigate(authNavigation['profile'])"
        title="Mi Perfil"
      >
        <div class="flex flex-col items-end">
          <span
            class="text-[10px] font-bold text-stone-800 leading-none capitalize group-hover:text-rose-900 transition-colors"
          >
            {{ user().name }}
          </span>
          <span class="text-[9px] text-stone-400">Mi Perfil</span>
        </div>

        <div
          class="w-9 h-9 rounded-full bg-rose-900 border-2 border-stone-50 flex items-center justify-center overflow-hidden text-[10px] font-bold text-rose-50 group-hover:ring-2 group-hover:ring-rose-200 transition-all shadow-sm"
        >
          @if (user().profilePhoto) {
            <img [src]="user().profilePhoto" alt="avatar" class="w-full h-full object-cover" />
          } @else {
            {{ userInitials() }}
          }
        </div>
      </div>

      <div class="h-6 w-[1px] bg-stone-200"></div>

      <button
        (click)="logout()"
        class="p-2 text-stone-400 hover:text-rose-900 hover:bg-rose-50 rounded-lg transition-all cursor-pointer group"
        title="Cerrar sesión"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          />
        </svg>
      </button>
    </div>
  }
</header>
