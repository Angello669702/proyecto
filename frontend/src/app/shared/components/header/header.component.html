<header class="h-16 border-b border-stone-300 flex items-center justify-between px-6">
  <div class="w-48 font-mono text-sm font-medium text-stone-800 uppercase tracking-widest">
    Mi Empresa
  </div>

  <nav class="flex gap-1">
    <a
      routerLinkActive="bg-stone-100 text-stone-900"
      class="px-4 py-1.5 text-xs uppercase tracking-wider text-stone-500 hover:text-stone-800 rounded transition-colors cursor-pointer"
      (click)="navigate(['/', 'home'])"
    >
      Inicio
    </a>
    <a
      routerLinkActive="bg-stone-100 text-stone-900"
      class="px-4 py-1.5 text-xs uppercase tracking-wider text-stone-500 hover:text-stone-800 rounded transition-colors cursor-pointer"
      (click)="navigate(productsNavigation['catalog'])"
    >
      Catálogo
    </a>
    <a
      routerLinkActive="bg-stone-100 text-stone-900"
      class="px-4 py-1.5 text-xs uppercase tracking-wider text-stone-500 hover:text-stone-800 rounded transition-colors cursor-pointer"
      (click)="navigate(transactionsNavigation['myCart'])"
    >
      Carrito
    </a>
  </nav>
  @if (!isLoggued()) {
    <div class="w-48 flex justify-end">
      <button
        class="px-4 py-1.5 text-xs uppercase tracking-wider border border-stone-300 rounded hover:bg-stone-50 text-stone-600"
        (click)="navigate(authNavigation['login'])"
      >
        Iniciar sesión
      </button>
    </div>
  } @else {
    <div class="w-48 flex justify-end items-center">
      <div
        class="w-10 h-10 rounded-full bg-stone-200 flex items-center justify-center overflow-hidden text-sm font-semibold text-stone-700 cursor-pointer"
        (click)="logout()"
        title="Cerrar sesión"
      >
        @if (user().profilePhoto) {
          <img [src]="user().profilePhoto" alt="avatar" class="w-full h-full object-cover" />
        } @else {
          {{ userInitials() }}
        }
      </div>
    </div>
  }
</header>
