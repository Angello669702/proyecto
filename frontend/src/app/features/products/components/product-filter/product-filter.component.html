<div class="flex flex-col gap-4 text-xs">
  <div class="flex items-center justify-between">
    <span class="font-mono uppercase tracking-wider text-stone-600"> Filtros </span>

    <button
      (click)="isExpanded.set(!isExpanded())"
      class="text-[10px] text-stone-500 hover:text-stone-800"
    >
      {{ isExpanded() ? 'Ocultar' : 'Mostrar' }}
    </button>
  </div>

  @if (isExpanded()) {
    <div class="flex flex-col gap-1">
      <label class="text-[10px] text-stone-400 uppercase">Buscar</label>
      <input
        type="text"
        [value]="searchText()"
        (input)="searchText.set($any($event.target).value)"
        placeholder="Nombre producto..."
        class="h-8 px-2 bg-stone-50 border border-stone-300 rounded text-xs focus:outline-none focus:border-stone-500"
      />
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-[10px] text-stone-400 uppercase">Categorías</label>

      <ng-select
        [items]="allCategories"
        [multiple]="true"
        [closeOnSelect]="false"
        [searchable]="true"
        placeholder="Seleccionar..."
        [ngModel]="selectedCategories()"
        (change)="selectedCategories.set($event)"
      >
      </ng-select>
    </div>

    <div class="flex flex-col gap-1">
      <label class="text-[10px] text-stone-400 uppercase">Precio</label>

      <div class="flex gap-2">
        <input
          type="number"
          placeholder="Min"
          [value]="minPrice()"
          (input)="minPrice.set(+$any($event.target).value || null)"
          class="w-full h-8 px-2 bg-stone-50 border border-stone-300 rounded text-xs focus:outline-none"
        />

        <input
          type="number"
          placeholder="Max"
          [value]="maxPrice()"
          (input)="maxPrice.set(+$any($event.target).value || null)"
          class="w-full h-8 px-2 bg-stone-50 border border-stone-300 rounded text-xs focus:outline-none"
        />
      </div>
    </div>

    <div class="flex flex-col gap-2 pt-2">
      <button
        (click)="applyFilters()"
        class="w-full h-8 bg-stone-800 text-white text-[10px] uppercase rounded hover:bg-stone-700"
      >
        Aplicar
      </button>

      <button
        (click)="clearFilters()"
        [disabled]="!hasActiveFilters()"
        class="w-full h-8 bg-stone-200 text-stone-600 text-[10px] uppercase rounded disabled:opacity-40"
      >
        Limpiar
      </button>
    </div>
  }
</div>
