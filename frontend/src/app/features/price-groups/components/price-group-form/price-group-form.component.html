<form [formGroup]="priceGroupForm" (submit)="sendForm()" class="flex flex-col gap-6">
  <div class="flex flex-col gap-1.5">
    <label class="text-[10px] font-bold uppercase tracking-widest text-stone-400"> Nombre </label>
    <input
      formControlName="name"
      type="text"
      placeholder="Ej. Hostelería Premium"
      class="w-full h-11 px-4 rounded-xl border border-stone-200 bg-stone-50 text-stone-900 text-sm placeholder:text-stone-300 focus:outline-none focus:ring-2 focus:ring-rose-900/20 focus:border-rose-900 transition-all"
    />
    @if (priceGroupForm.get('name')?.invalid && priceGroupForm.get('name')?.touched) {
      <p class="text-xs text-red-600">El nombre es obligatorio.</p>
    }
  </div>

  <div class="flex flex-col gap-1.5">
    <label class="text-[10px] font-bold uppercase tracking-widest text-stone-400">
      Descripción
    </label>
    <textarea
      formControlName="description"
      rows="4"
      placeholder="Describe el tipo de clientes o condiciones de este grupo..."
      class="w-full px-4 py-3 rounded-xl border border-stone-200 bg-stone-50 text-stone-900 text-sm placeholder:text-stone-300 focus:outline-none focus:ring-2 focus:ring-rose-900/20 focus:border-rose-900 transition-all resize-none"
    ></textarea>
    @if (priceGroupForm.get('description')?.invalid && priceGroupForm.get('description')?.touched) {
      <p class="text-xs text-red-600">La descripción es obligatoria.</p>
    }
  </div>

  @if (message()) {
    <p class="text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
      {{ message() }}
    </p>
  }

  <div class="flex justify-end">
    <button
      type="submit"
      class="h-11 px-8 bg-rose-900 text-white text-xs font-bold uppercase tracking-widest rounded-xl hover:bg-rose-950 transition-all shadow-lg shadow-rose-900/20 active:scale-95 cursor-pointer"
    >
      Crear grupo
    </button>
  </div>
</form>
