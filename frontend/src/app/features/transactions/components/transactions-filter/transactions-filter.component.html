<div class="flex flex-col sm:flex-row items-center justify-between gap-6 mb-8">
  <div class="flex flex-col gap-1">
    <span class="text-[10px] font-bold text-stone-400 uppercase tracking-[0.3em]">Pedidos</span>
    <h2 class="font-serif text-2xl font-bold text-stone-900">Filtrar por Estado</h2>
  </div>

  <div class="flex flex-wrap p-1.5 bg-stone-100 rounded-xl border border-stone-200">
    <button
      (click)="applyFilter('all')"
      class="px-5 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all cursor-pointer"
      [class]="
        currentFilter() === 'all'
          ? 'bg-white text-stone-900 shadow-sm'
          : 'text-stone-500 hover:text-stone-700'
      "
    >
      Todos
    </button>

    <button
      (click)="applyFilter(TransactionStatus.PENDING)"
      class="px-5 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all cursor-pointer"
      [class]="
        currentFilter() === TransactionStatus.PENDING
          ? 'bg-white text-amber-600 shadow-sm'
          : 'text-stone-500 hover:text-amber-600'
      "
    >
      Pendiente
    </button>

    <button
      (click)="applyFilter(TransactionStatus.PREPARING)"
      class="px-5 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all cursor-pointer"
      [class]="
        currentFilter() === TransactionStatus.PREPARING
          ? 'bg-white text-blue-600 shadow-sm'
          : 'text-stone-500 hover:text-blue-600'
      "
    >
      Preparando
    </button>

    <button
      (click)="applyFilter(TransactionStatus.SHIPPED)"
      class="px-5 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all cursor-pointer"
      [class]="
        currentFilter() === TransactionStatus.SHIPPED
          ? 'bg-white text-violet-600 shadow-sm'
          : 'text-stone-500 hover:text-violet-600'
      "
    >
      Enviado
    </button>

    <button
      (click)="applyFilter(TransactionStatus.DELIVERED)"
      class="px-5 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all cursor-pointer"
      [class]="
        currentFilter() === TransactionStatus.DELIVERED
          ? 'bg-white text-emerald-600 shadow-sm'
          : 'text-stone-500 hover:text-emerald-600'
      "
    >
      Entregado
    </button>

    <button
      (click)="applyFilter(TransactionStatus.CANCELLED)"
      class="px-5 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg transition-all cursor-pointer"
      [class]="
        currentFilter() === TransactionStatus.CANCELLED
          ? 'bg-white text-rose-900 shadow-sm'
          : 'text-stone-500 hover:text-rose-900'
      "
    >
      Cancelado
    </button>
  </div>
</div>
