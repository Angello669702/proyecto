<div class="min-h-[80vh] flex items-center justify-center px-6 py-12 bg-stone-50">
  <div
    class="w-full max-w-md bg-white p-8 lg:p-10 rounded-2xl shadow-xl shadow-stone-200/50 border border-stone-100 animate-fade-in"
  >
    <div class="flex flex-col items-center gap-3 mb-8">
      <div
        class="w-12 h-12 bg-rose-900 rounded-xl flex items-center justify-center shadow-lg shadow-rose-900/20"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="white"
          viewBox="0 0 256 256"
        >
          <path
            d="M224,128a96,96,0,1,1-96-96A96.11,96.11,0,0,1,224,128ZM128,72a40,40,0,1,0,40,40A40,40,0,0,0,128,72Zm0,144a87.8,87.8,0,0,0,64.12-27.43,64,64,0,0,0-128.24,0A87.8,87.8,0,0,0,128,216Z"
          ></path>
        </svg>
      </div>

      <h2 class="font-serif text-2xl font-bold text-stone-900">Solicitud de Acceso</h2>

      <p class="text-stone-400 text-xs uppercase tracking-widest font-medium">Completa tus datos</p>
    </div>

    @if (message()) {
      <div
        class="mb-6 p-3 bg-red-50 border border-red-100 rounded-lg flex items-center gap-3 animate-shake"
      >
        <span class="text-[11px] font-bold uppercase tracking-wide text-red-600">
          {{ message() }}
        </span>
      </div>
    }

    <form (submit)="submitForm()" [formGroup]="registrationForm" class="flex flex-col gap-5">
      <div class="flex flex-col gap-1.5">
        <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-stone-500">
          Empresa
        </label>
        <input
          type="text"
          formControlName="companyName"
          placeholder="Nombre de la empresa"
          class="w-full h-12 px-4 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-rose-900 focus:ring-1 focus:ring-rose-900"
        />
        @let field = registrationForm.get('companyName');
        @if (field?.dirty && field?.invalid) {
          <span class="ml-1 text-[10px] text-red-500 italic"> * Campo obligatorio </span>
        }
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-stone-500">
          NIF / CIF
        </label>
        <input
          type="text"
          formControlName="nif"
          placeholder="B12345678"
          class="w-full h-12 px-4 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-rose-900 focus:ring-1 focus:ring-rose-900"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-stone-500">
          Persona de contacto
        </label>
        <input
          type="text"
          formControlName="contactName"
          placeholder="Nombre completo"
          class="w-full h-12 px-4 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-rose-900 focus:ring-1 focus:ring-rose-900"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-stone-500">
          Email
        </label>
        <input
          type="email"
          formControlName="email"
          placeholder="correo@empresa.com"
          class="w-full h-12 px-4 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-rose-900 focus:ring-1 focus:ring-rose-900"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-stone-500">
          Teléfono
        </label>
        <input
          type="text"
          formControlName="phone"
          placeholder="+34 600 000 000"
          class="w-full h-12 px-4 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-rose-900 focus:ring-1 focus:ring-rose-900"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-stone-500">
          Dirección
        </label>
        <input
          type="text"
          formControlName="address"
          placeholder="Calle, ciudad..."
          class="w-full h-12 px-4 bg-stone-50 border border-stone-200 rounded-xl text-sm focus:outline-none focus:border-rose-900 focus:ring-1 focus:ring-rose-900"
        />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="ml-1 text-[10px] font-bold uppercase tracking-widest text-stone-500">
          Notas
        </label>
        <textarea
          formControlName="notes"
          rows="3"
          placeholder="Información adicional..."
          class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm resize-none focus:outline-none focus:border-rose-900 focus:ring-1 focus:ring-rose-900"
        ></textarea>
      </div>

      <button
        type="submit"
        [disabled]="registrationForm.invalid"
        class="w-full h-12 mt-4 bg-rose-900 text-white text-xs font-bold uppercase tracking-[0.2em] rounded-xl hover:bg-rose-950 shadow-lg shadow-rose-900/20 active:scale-[0.98] transition-all disabled:opacity-40 disabled:cursor-not-allowed"
      >
        Enviar Solicitud
      </button>
    </form>
  </div>
</div>
